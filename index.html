<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz Cumpleaños Mergui 🌸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/home.css" />
  </head>
  <body>
    <main id="app" class="app" aria-hidden="true">
      <header class="site-header">
        <h1 class="site-title">Querida Mergui <span class="emoji">🌸</span></h1>
        <p class="site-subtitle">
          Un pequeño jardín digital hecho solo para ti
        </p>
      </header>

      <section id="countdown-section" class="countdown-section">
        <!-- Filled by countdown.js -->
      </section>

      <section id="nav-section" class="nav-section">
        <h2 class="nav-title">
          Cada año tuyo es una flor que siembras en mi corazón<span
            class="emoji"
            >🌷</span
          >
        </h2>
        <div
          id="year-nav"
          class="year-nav"
          role="navigation"
          aria-label="Year pages"
        >
          <!-- Filled by nav.js -->
        </div>
      </section>
    </main>

    <canvas
      id="confetti-canvas"
      class="confetti-canvas"
      aria-hidden="true"
    ></canvas>

    <script src="scripts/login.js"></script>
    <script src="scripts/confetti.js"></script>
    <script src="scripts/countdown.js"></script>
    <script src="scripts/nav.js"></script>
  </body>
</html>
